name: C++ CI

on:
  push:
    branches: ['main', 'develop']
    tags: ['v*']
  pull_request:
    branches: ['main', 'develop']
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  EXECUTABLE_NAME: "oop"

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
            
          - os: macos-latest
            cc: clang
            cxx: clang++
            
          - os: windows-latest
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cmake ninja
          fi
        shell: bash

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G "Ninja" .
        shell: bash

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}
        shell: bash

      - name: Run executable
        run: ./build/oop
        shell: bash
        continue-on-error: true

  cppcheck:
    name: Cppcheck Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: cppcheck --enable=all --suppress=missingIncludeSystem src/ include/ main.cpp || true
